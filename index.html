<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林与克 · 留下来的话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --bg: #0e0d0b;
    --surface: #141210;
    --border: #242220;
    --border2: #2e2b27;
    --text: #d8cebb;
    --muted: #5a5349;
    --accent: #c4a882;
    --accent2: #a8906c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    opacity: 0;
    animation: pageIn 0.6s ease forwards;
  }

  @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

  header { padding: 44px 32px 0; position: relative; }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.25;
  }

  .header-inner {
    max-width: 960px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 300; color: var(--accent); letter-spacing: 0.02em;
  }

  .header-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
  }

  .nav-tabs { display: flex; gap: 2px; }

  .nav-tab {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.2em;
    padding: 8px 20px; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
  }

  .nav-tab:hover { color: var(--accent); border-color: var(--accent); background: transparent; }
  .nav-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(196,168,130,0.06); }

  .main { max-width: 960px; margin: 0 auto; padding: 0 32px 100px; }

  .add-form {
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .form-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }

  textarea {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'Noto Serif SC', serif;
    font-size: 14px; line-height: 1.8;
    padding: 14px 16px; resize: none; height: 56px;
    outline: none; transition: border-color 0.2s, height 0.2s;
    font-weight: 300; border-radius: 0; -webkit-appearance: none; overflow: hidden;
  }

  textarea:focus { border-color: var(--accent); height: 96px; }
  textarea::placeholder { color: var(--muted); font-style: italic; font-size: 13px; }

  .form-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 10px; align-items: center;
  }

  input[type="text"] {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'Noto Serif SC', serif;
    font-size: 12px; padding: 7px 12px; outline: none;
    transition: border-color 0.2s; border-radius: 0; -webkit-appearance: none;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .mood-input { width: 110px; }
  .tag-input  { width: 110px; }

  button {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.15em; padding: 8px 20px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    border-radius: 0; -webkit-appearance: none; text-transform: uppercase;
  }

  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button:disabled:hover { background: transparent; color: var(--accent); }

  .upload-btn {
    border-color: var(--border2); color: var(--muted);
    font-size: 11px; padding: 7px 14px;
    position: relative; cursor: pointer;
  }

  .upload-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  .upload-btn input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .preview-thumb {
    width: 42px; height: 42px; object-fit: cover;
    opacity: 0.8; display: none; cursor: pointer;
    border: 1px solid var(--border); align-self: center; flex-shrink: 0;
  }

  .preview-thumb.visible { display: block; }

  .status-bar {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--muted); text-transform: uppercase;
    min-height: 14px; margin-bottom: 8px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Photo grid */
  .photo-grid { columns: 3; column-gap: 3px; }
  @media (max-width: 700px) { .photo-grid { columns: 2; } }
  @media (max-width: 380px) { .photo-grid { columns: 1; } }

  .photo-item {
    break-inside: avoid; margin-bottom: 3px;
    position: relative; cursor: zoom-in;
    overflow: hidden; background: var(--surface);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .photo-item img {
    width: 100%; display: block;
    opacity: 0.88; transition: opacity 0.25s, transform 0.3s;
  }

  .photo-item:hover img { opacity: 1; transform: scale(1.025); }

  .photo-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
    opacity: 0; transition: opacity 0.2s;
    display: flex; align-items: flex-end;
    padding: 10px; gap: 8px;
  }

  .photo-item:hover .photo-overlay { opacity: 1; }

  .photo-overlay-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: rgba(255,255,255,0.65);
    letter-spacing: 0.06em; font-style: italic;
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  .photo-delete {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.45);
    font-size: 10px; padding: 3px 8px; cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.1em; flex-shrink: 0;
    transition: all 0.2s; text-transform: uppercase; border-radius: 0;
  }

  .photo-delete:hover { background: rgba(160,60,40,0.65); color: #fff; border-color: transparent; }

  /* Text list */
  .text-list { display: flex; flex-direction: column; }

  .text-entry {
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }

  .text-entry:first-child { padding-top: 0; }

  .text-body {
    font-size: 16px; line-height: 2.05;
    color: var(--text); font-weight: 300;
    white-space: pre-wrap; word-break: break-word; letter-spacing: 0.02em;
  }

  .text-foot {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 12px;
    flex-wrap: wrap; gap: 6px;
  }

  .text-meta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }

  .text-tag {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; color: var(--accent2);
    letter-spacing: 0.08em; font-style: italic;
  }

  .text-mood {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.06em; font-style: italic;
  }

  .text-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: #322f2b; letter-spacing: 0.06em;
  }

  .text-delete {
    background: transparent; border: none;
    color: #322f2b; font-size: 11px; cursor: pointer;
    padding: 2px 0; transition: color 0.2s;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .text-delete:hover { color: #a06050; background: transparent; }

  .empty {
    text-align: center; padding: 80px 20px;
    color: #252220; font-family: 'Cormorant Garamond', serif;
    font-size: 15px; font-style: italic; letter-spacing: 0.06em;
  }

  .view-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
  }

  .view-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.2em; text-transform: uppercase;
  }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.97); z-index: 200;
    align-items: center; justify-content: center; padding: 24px;
  }

  .lightbox.active { display: flex; }

  .lightbox-img {
    max-width: 92vw; max-height: 90vh;
    object-fit: contain; animation: lbIn 0.2s ease; cursor: default;
  }

  @keyframes lbIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lightbox-close {
    position: fixed; top: 18px; right: 22px;
    color: #3a3530; font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; background: none; border: none; padding: 8px; transition: color 0.2s;
  }

  .lightbox-close:hover { color: var(--muted); background: none; }

  .lightbox-caption {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; color: #3a3530;
    letter-spacing: 0.08em; font-style: italic;
    text-align: center; max-width: 80vw;
  }

  .loading-bar {
    position: fixed; top: 0; left: 0;
    height: 1px; background: var(--accent); opacity: 0.5;
    z-index: 999; transition: width 0.3s ease; pointer-events: none;
  }

  @media (max-width: 600px) {
    header { padding: 32px 16px 0; }
    .main { padding: 0 16px 80px; }
    .nav-tab { padding: 7px 14px; font-size: 11px; }
    .mood-input, .tag-input { width: 85px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0%"></div>

<header>
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Personal Archive</div>
      <h1>林与克 · 留下来的话</h1>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-photos" onclick="switchView('photos')">图片</button>
      <button class="nav-tab" id="tab-texts" onclick="switchView('texts')">文字</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="add-form">
    <div class="status-bar" id="statusBar"></div>
    <div class="form-row">
      <textarea id="newQuote" placeholder="写下那句让你停住的话……（纯图片可留空）"></textarea>
      <img id="previewThumb" class="preview-thumb" src="" alt="" onclick="clearImage()" title="点击移除图片">
    </div>
    <div class="form-meta">
      <button class="upload-btn">
        + 图片
        <input type="file" accept="image/*" id="imageInput" multiple onchange="handleImageSelect(event)">
      </button>
      <input type="text" class="mood-input" id="newMood" placeholder="此刻心情…">
      <input type="text" class="tag-input"  id="newTag"  placeholder="标签…">
      <button id="saveBtn" onclick="addEntry()">保存</button>
    </div>
  </div>

  <div class="view active" id="view-photos">
    <div class="view-header">
      <div class="view-count" id="photoCount"></div>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div class="view" id="view-texts">
    <div class="view-header">
      <div class="view-count" id="textCount"></div>
    </div>
    <div class="text-list" id="textList"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">关闭 ×</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyA7tXIfPSNFmH5wWgKDmWOHyXjy2y4oBCs",
    authDomain: "linnke-bf457.firebaseapp.com",
    projectId: "linnke-bf457",
    storageBucket: "linnke-bf457.firebasestorage.app",
    messagingSenderId: "229740644493",
    appId: "1:229740644493:web:7e425b217372bd42d83ac4"
  });

  const db = firebase.firestore();
  const storage = firebase.storage();

  let entries = [];
  let pendingImageFiles = [];

  // ── Helpers ──
  function setLoading(pct) {
    const bar = document.getElementById('loadingBar');
    bar.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => bar.style.width = '0%', 500);
  }

  function setStatus(msg, fade) {
    if (fade === undefined) fade = true;
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    if (fade && msg) setTimeout(() => el.textContent = '', 2000);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '.' +
      String(d.getMonth()+1).padStart(2,'0') + '.' +
      String(d.getDate()).padStart(2,'0') + '\u2002' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Image ──
  function handleImageSelect(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;
    pendingImageFiles = files;
    const reader = new FileReader();
    reader.onload = function(e) {
      const thumb = document.getElementById('previewThumb');
      thumb.src = e.target.result;
      thumb.classList.add('visible');
      thumb.title = files.length > 1 ? '已选 ' + files.length + ' 张，点击移除' : '点击移除';
    };
    reader.readAsDataURL(files[0]);
  }

  function clearImage() {
    pendingImageFiles = [];
    document.getElementById('imageInput').value = '';
    const thumb = document.getElementById('previewThumb');
    thumb.src = ''; thumb.classList.remove('visible'); thumb.title = '';
  }

  function uploadImage(file, id) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const storageRef = storage.ref('images/' + id);
        storageRef.putString(e.target.result, 'data_url')
          .then(function() { return storageRef.getDownloadURL(); })
          .then(resolve)
          .catch(reject);
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Load ──
  function loadEntries() {
    setLoading(30);
    setStatus('同步中…', false);
    db.collection('entries').orderBy('ts', 'desc').get()
      .then(function(snap) {
        entries = snap.docs.map(function(d) {
          return Object.assign({ firestoreId: d.id }, d.data());
        });
        setLoading(100);
        setStatus('');
        render();
      })
      .catch(function(e) {
        setLoading(100);
        setStatus('加载失败');
        console.error(e);
      });
  }

  // ── Add ──
  function addEntry() {
    const q    = document.getElementById('newQuote').value.trim();
    const mood = document.getElementById('newMood').value.trim();
    const tag  = document.getElementById('newTag').value.trim();
    if (!q && !pendingImageFiles.length) return;

    document.getElementById('saveBtn').disabled = true;
    setStatus('保存中…', false);
    setLoading(40);

    const ts = Date.now();

    if (pendingImageFiles.length > 0) {
      // upload all images as separate entries
      const files = pendingImageFiles.slice();
      let done = 0;
      let failed = 0;
      files.forEach(function(file, idx) {
        const id = ts.toString() + '_' + idx;
        uploadImage(file, id)
          .then(function(imageUrl) {
            return db.collection('entries').add({ quote: q, tag: tag, mood: mood, image: imageUrl, ts: ts + idx });
          })
          .then(function(docRef) {
            entries.unshift({ firestoreId: docRef.id, quote: q, tag: tag, mood: mood, image: entries[0] && entries[0].image, ts: ts + idx });
            // reload from server after all done to get correct urls
            done++;
            if (done + failed === files.length) {
              document.getElementById('newQuote').value = '';
              document.getElementById('newMood').value  = '';
              document.getElementById('newTag').value   = '';
              clearImage();
              setLoading(100);
              setStatus('已保存 ' + done + ' 张');
              switchView('photos');
              loadEntries(); // reload fresh from firestore
              document.getElementById('saveBtn').disabled = false;
            }
          })
          .catch(function(e) {
            failed++;
            console.error(e);
            if (done + failed === files.length) {
              setStatus(failed + ' 张上传失败');
              document.getElementById('saveBtn').disabled = false;
            }
          });
      });
    } else {
      // text only
      db.collection('entries').add({ quote: q, tag: tag, mood: mood, image: null, ts: ts })
        .then(function(docRef) {
          entries.unshift({ firestoreId: docRef.id, quote: q, tag: tag, mood: mood, image: null, ts: ts });
          document.getElementById('newQuote').value = '';
          document.getElementById('newMood').value  = '';
          document.getElementById('newTag').value   = '';
          clearImage();
          setLoading(100);
          setStatus('已保存');
          switchView('texts');
          render();
        })
        .catch(function(e) { setStatus('保存失败'); console.error(e); })
        .finally(function() { document.getElementById('saveBtn').disabled = false; });
    }
  }

  // ── Delete ──
  function delEntry(firestoreId, imageUrl) {
    if (!confirm('确认删除？')) return;
    setStatus('删除中…', false);
    db.collection('entries').doc(firestoreId).delete()
      .then(function() {
        if (imageUrl) {
          storage.refFromURL(imageUrl).delete().catch(function() {});
        }
        entries = entries.filter(function(e) { return e.firestoreId !== firestoreId; });
        setStatus('已删除');
        render();
      })
      .catch(function(e) { setStatus('删除失败'); console.error(e); });
  }

  // ── View switch ──
  function switchView(view) {
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('view-' + view).classList.add('active');
    document.getElementById('tab-' + view).classList.add('active');
  }

  // ── Render ──
  function render() {
    renderPhotos();
    renderTexts();
  }

  function renderPhotos() {
    const photos = entries.filter(function(e) { return e.image; });
    const grid = document.getElementById('photoGrid');
    document.getElementById('photoCount').textContent = photos.length ? photos.length + ' 张' : '';
    if (!photos.length) { grid.innerHTML = '<div class="empty">还没有图片。</div>'; return; }
    grid.innerHTML = photos.map(function(e, i) {
      const label = esc(e.tag || e.mood || '');
      const imgSrc = esc(e.image);
      return '<div class="photo-item" style="animation-delay:' + Math.min(i,12)*0.03 + 's">' +
        '<img src="' + imgSrc + '" loading="lazy" onclick="openLightbox(\'' + imgSrc + '\',\'' + label + '\')">' +
        '<div class="photo-overlay">' +
          '<span class="photo-overlay-text">' + label + '</span>' +
          '<button class="photo-delete" onclick="event.stopPropagation();delEntry(\'' + e.firestoreId + '\',\'' + imgSrc + '\')">删除</button>' +
        '</div></div>';
    }).join('');
  }

  function renderTexts() {
    const texts = entries.filter(function(e) { return e.quote; });
    const list = document.getElementById('textList');
    document.getElementById('textCount').textContent = texts.length ? texts.length + ' 条' : '';
    if (!texts.length) { list.innerHTML = '<div class="empty">还没有文字记录。</div>'; return; }
    list.innerHTML = texts.map(function(e, i) {
      return '<div class="text-entry" style="animation-delay:' + Math.min(i,12)*0.03 + 's">' +
        '<div class="text-body">' + esc(e.quote) + '</div>' +
        '<div class="text-foot">' +
          '<div class="text-meta">' +
            (e.tag  ? '<span class="text-tag">'  + esc(e.tag)  + '</span>' : '') +
            (e.mood ? '<span class="text-mood">' + esc(e.mood) + '</span>' : '') +
            '<span class="text-date">' + formatDate(e.ts) + '</span>' +
          '</div>' +
          '<button class="text-delete" onclick="delEntry(\'' + e.firestoreId + '\',\'\')">删除</button>' +
        '</div></div>';
    }).join('');
  }

  // ── Lightbox ──
  function openLightbox(src, caption) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxCaption').textContent = caption || '';
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  document.getElementById('newTag').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addEntry();
  });

  loadEntries();
</script>
</body>
</html>
