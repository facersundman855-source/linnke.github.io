<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林与克 · 留下来的话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --bg: #0e0d0b;
    --surface: #141210;
    --surface2: #1a1815;
    --border: #272320;
    --border2: #312e2a;
    --text: #d8cebb;
    --muted: #635c52;
    --accent: #c4a882;
    --accent2: #a8906c;
    --mood-calm: #7a9e8e;
    --mood-moved: #9e7a8e;
    --mood-heavy: #7a8e9e;
    --mood-warm: #c4a882;
    --mood-sharp: #9e8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    padding: 0 0 100px;
    opacity: 0;
    animation: pageIn 0.8s ease forwards;
  }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header {
    padding: 56px 40px 44px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.35;
  }

  .header-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 300;
    color: var(--accent);
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .subtitle { font-size: 13px; color: var(--muted); font-weight: 300; margin-bottom: 20px; }

  .header-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: #4a4540;
    letter-spacing: 0.04em;
    line-height: 1.7;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    max-width: 480px;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

  /* ── Loading state ── */
  .loading-bar {
    position: fixed;
    top: 0; left: 0;
    height: 1px;
    background: var(--accent);
    opacity: 0.6;
    transition: width 0.3s ease;
    z-index: 999;
  }

  .sync-status {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    min-height: 16px;
    transition: opacity 0.3s;
  }

  /* ── Add section ── */
  .add-section { margin: 44px 0 36px; }

  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.85;
    padding: 18px 20px;
    resize: vertical;
    min-height: 96px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    font-weight: 300;
    border-radius: 0;
    -webkit-appearance: none;
  }

  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(196,168,130,0.08); }
  textarea::placeholder { color: var(--muted); font-style: italic; }

  .mood-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .mood-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .mood-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mood-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  .mood-btn.selected-calm  { border-color: var(--mood-calm);  color: var(--mood-calm);  background: rgba(122,158,142,0.07); }
  .mood-btn.selected-moved { border-color: var(--mood-moved); color: var(--mood-moved); background: rgba(158,122,142,0.07); }
  .mood-btn.selected-heavy { border-color: var(--mood-heavy); color: var(--mood-heavy); background: rgba(122,142,158,0.07); }
  .mood-btn.selected-warm  { border-color: var(--mood-warm);  color: var(--mood-warm);  background: rgba(196,168,130,0.07); }
  .mood-btn.selected-sharp { border-color: var(--mood-sharp); color: var(--mood-sharp); background: rgba(158,138,122,0.07); }

  .upload-area {
    border: 1px dashed var(--border2);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.06em;
    position: relative;
  }

  .upload-area:hover { border-color: var(--accent); color: var(--accent); }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .preview-wrap { margin-top: 10px; position: relative; display: none; }

  .preview-wrap img {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    display: block;
    opacity: 0.82;
  }

  .preview-remove {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .preview-remove:hover { color: var(--text); background: rgba(0,0,0,0.95); }

  .add-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
    -webkit-appearance: none;
    min-width: 0;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border-radius: 0;
    -webkit-appearance: none;
  }

  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:disabled:hover { background: transparent; color: var(--accent); }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 24px;
  }

  .filter-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-tag {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 4px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-style: italic;
  }

  .filter-tag:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  .filter-tag.active { border-color: var(--accent); color: var(--accent); background: rgba(196,168,130,0.06); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .count { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  .export-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .export-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 36px; }

  .entries { display: flex; flex-direction: column; gap: 2px; }

  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 28px;
    position: relative;
    transition: border-color 0.25s;
    animation: entryIn 0.45s ease both;
  }

  @keyframes entryIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry:hover { border-color: var(--border2); }

  .entry-mood-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 2px; }
  .mood-bar-calm  { background: var(--mood-calm);  opacity: 0.5; }
  .mood-bar-moved { background: var(--mood-moved); opacity: 0.5; }
  .mood-bar-heavy { background: var(--mood-heavy); opacity: 0.5; }
  .mood-bar-warm  { background: var(--mood-warm);  opacity: 0.5; }
  .mood-bar-sharp { background: var(--mood-sharp); opacity: 0.5; }

  .entry-image {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
    margin-bottom: 18px;
    opacity: 0.86;
    cursor: zoom-in;
    transition: opacity 0.2s;
  }

  .entry-image:hover { opacity: 0.95; }

  .entry-quote {
    font-size: 15px;
    line-height: 1.95;
    color: var(--text);
    font-weight: 300;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .entry-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 6px;
  }

  .entry-meta-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .entry-tag {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    font-style: italic;
  }

  .entry-mood-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    font-style: italic;
  }

  .entry-date { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; font-family: 'Cormorant Garamond', serif; }

  .entry-actions {
    position: absolute;
    top: 14px; right: 14px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .entry:hover .entry-actions { opacity: 1; }

  .btn-icon {
    background: rgba(14,13,11,0.85);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 10px;
    transition: all 0.2s;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.08em;
  }

  .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .btn-delete:hover { color: #b07060; border-color: #b07060; background: rgba(176,112,96,0.07); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #3a3530;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    letter-spacing: 0.06em;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    padding: 28px;
    width: 100%;
    max-width: 540px;
    max-height: 92vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease both;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.97) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  .btn-cancel { border-color: var(--border); color: var(--muted); }
  .btn-cancel:hover { background: var(--border); color: var(--text); }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 200;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 24px;
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    animation: lbIn 0.2s ease both;
    cursor: default;
  }

  @keyframes lbIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    padding: 8px;
  }

  .lightbox-close:hover { color: var(--text); background: none; }

  @media (max-width: 600px) {
    header { padding: 40px 20px 32px; }
    .container { padding: 0 16px; }
    .add-section { margin: 32px 0 28px; }
    .entry { padding: 18px 20px; }
    .add-row { flex-wrap: wrap; }
    .add-row button { width: 100%; }
    .entry-actions { opacity: 1; top: 12px; right: 12px; }
    .toolbar { flex-direction: column; align-items: flex-start; }
    .mood-row { gap: 6px; }
    .modal { padding: 22px 18px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0%"></div>

<header>
  <div class="container">
    <div class="header-eyebrow">Personal Archive</div>
    <h1>林与克 · 留下来的话</h1>
    <div class="subtitle">那些被击中的瞬间</div>
    <div class="header-quote">有些话只落一次，<br>要接住它。</div>
  </div>
</header>

<div class="container">

  <div class="add-section">
    <div class="section-label">记下来</div>
    <div class="sync-status" id="syncStatus"></div>
    <textarea id="newQuote" placeholder="把那句让你停住的话写在这里……（也可以只存图片）"></textarea>

    <div class="mood-row">
      <span class="mood-label">此刻</span>
      <button class="mood-btn" data-mood="calm"  onclick="selectMood('calm',  'new')">平静</button>
      <button class="mood-btn" data-mood="moved" onclick="selectMood('moved', 'new')">触动</button>
      <button class="mood-btn" data-mood="heavy" onclick="selectMood('heavy', 'new')">沉重</button>
      <button class="mood-btn" data-mood="warm"  onclick="selectMood('warm',  'new')">温热</button>
      <button class="mood-btn" data-mood="sharp" onclick="selectMood('sharp', 'new')">刺痛</button>
    </div>

    <div class="upload-area">
      添加图片（可选）
      <input type="file" accept="image/*" id="imageInput" onchange="handleImageSelect(event, 'previewImg', 'previewWrap', 'new')">
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="">
      <button class="preview-remove" onclick="clearImage('new')">移除</button>
    </div>

    <div class="add-row">
      <input type="text" id="newTag" placeholder="标签（可选，如：被看见 / 照片 / 克说的）">
      <button id="saveBtn" onclick="addEntry()">保存</button>
    </div>
  </div>

  <hr class="divider">

  <div class="filter-bar" id="filterBar"></div>

  <div class="toolbar">
    <div id="countDisplay" class="count"></div>
    <button class="export-btn" onclick="exportJSON()">导出备份</button>
  </div>

  <div id="entries" class="entries"></div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>编辑这条记录</h3>
    <textarea id="editQuote" style="min-height:90px"></textarea>

    <div class="mood-row" style="margin-top:12px">
      <span class="mood-label">此刻</span>
      <button class="mood-btn" data-mood="calm"  onclick="selectMood('calm',  'edit')">平静</button>
      <button class="mood-btn" data-mood="moved" onclick="selectMood('moved', 'edit')">触动</button>
      <button class="mood-btn" data-mood="heavy" onclick="selectMood('heavy', 'edit')">沉重</button>
      <button class="mood-btn" data-mood="warm"  onclick="selectMood('warm',  'edit')">温热</button>
      <button class="mood-btn" data-mood="sharp" onclick="selectMood('sharp', 'edit')">刺痛</button>
    </div>

    <div class="upload-area" style="margin-top:10px">
      替换图片（可选）
      <input type="file" accept="image/*" id="editImageInput" onchange="handleImageSelect(event, 'editPreviewImg', 'editPreviewWrap', 'edit')">
    </div>

    <div class="preview-wrap" id="editPreviewWrap">
      <img id="editPreviewImg" src="" alt="">
      <button class="preview-remove" onclick="clearImage('edit')">移除图片</button>
    </div>

    <div class="add-row" style="margin-top:10px">
      <input type="text" id="editTag" placeholder="标签">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
  <button class="lightbox-close" onclick="closeLightbox()">关闭 ×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage, ref, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7tXIfPSNFmH5wWgKDmWOHyXjy2y4oBCs",
    authDomain: "linnke-bf457.firebaseapp.com",
    projectId: "linnke-bf457",
    storageBucket: "linnke-bf457.firebasestorage.app",
    messagingSenderId: "229740644493",
    appId: "1:229740644493:web:7e425b217372bd42d83ac4",
    measurementId: "G-RNF6GX1QH7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // ── State ──
  let entries = [];
  let editingId = null;
  let pendingImageFile = null;
  let editImageUrl = null;
  let pendingMood = null;
  let editMood = null;
  let activeFilter = null;

  const moodMap = {
    calm:  { label: '平静', color: 'var(--mood-calm)'  },
    moved: { label: '触动', color: 'var(--mood-moved)' },
    heavy: { label: '沉重', color: 'var(--mood-heavy)' },
    warm:  { label: '温热', color: 'var(--mood-warm)'  },
    sharp: { label: '刺痛', color: 'var(--mood-sharp)' },
  };

  function setLoading(pct) {
    document.getElementById('loadingBar').style.width = pct + '%';
    if (pct >= 100) setTimeout(() => document.getElementById('loadingBar').style.width = '0%', 400);
  }

  function setStatus(msg, fade = true) {
    const el = document.getElementById('syncStatus');
    el.textContent = msg;
    if (fade && msg) setTimeout(() => { el.textContent = ''; }, 2000);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Mood ──
  window.selectMood = function(mood, mode) {
    const container = mode === 'new'
      ? document.querySelector('.add-section .mood-row')
      : document.querySelector('#editModal .mood-row');
    container.querySelectorAll('.mood-btn').forEach(b => b.className = 'mood-btn');
    container.querySelector(`[data-mood="${mood}"]`).classList.add(`selected-${mood}`);
    if (mode === 'new') pendingMood = mood;
    else editMood = mood;
  };

  // ── Image ──
  window.handleImageSelect = function(event, imgId, wrapId, mode) {
    const file = event.target.files[0];
    if (!file) return;
    if (mode === 'new') pendingImageFile = file;
    else pendingImageFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(imgId).src = e.target.result;
      document.getElementById(wrapId).style.display = 'block';
      if (mode === 'edit') editImageUrl = '__pending__';
    };
    reader.readAsDataURL(file);
  };

  window.clearImage = function(mode) {
    if (mode === 'new') {
      pendingImageFile = null;
      document.getElementById('imageInput').value = '';
      document.getElementById('previewWrap').style.display = 'none';
    } else {
      editImageUrl = null;
      pendingImageFile = null;
      document.getElementById('editImageInput').value = '';
      document.getElementById('editPreviewWrap').style.display = 'none';
    }
  };

  async function uploadImage(file, id) {
    const storageRef = ref(storage, `images/${id}`);
    const reader = new FileReader();
    return new Promise((resolve, reject) => {
      reader.onload = async e => {
        try {
          await uploadString(storageRef, e.target.result, 'data_url');
          const url = await getDownloadURL(storageRef);
          resolve(url);
        } catch (err) { reject(err); }
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Load from Firestore ──
  async function loadEntries() {
    setLoading(30);
    setStatus('同步中…', false);
    try {
      const q = query(collection(db, 'entries'), orderBy('ts', 'desc'));
      const snap = await getDocs(q);
      entries = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
      setLoading(100);
      setStatus('已同步');
      render();
    } catch (e) {
      setLoading(100);
      setStatus('加载失败，检查网络');
      console.error(e);
    }
  }

  // ── Add ──
  window.addEntry = async function() {
    const q = document.getElementById('newQuote').value.trim();
    const t = document.getElementById('newTag').value.trim();
    if (!q && !pendingImageFile) return;

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    setStatus('保存中…', false);
    setLoading(40);

    try {
      const ts = Date.now();
      let imageUrl = null;

      if (pendingImageFile) {
        const tempId = ts.toString();
        imageUrl = await uploadImage(pendingImageFile, tempId);
      }

      const docRef = await addDoc(collection(db, 'entries'), {
        quote: q, tag: t, mood: pendingMood, image: imageUrl, ts
      });

      entries.unshift({ firestoreId: docRef.id, quote: q, tag: t, mood: pendingMood, image: imageUrl, ts });

      document.getElementById('newQuote').value = '';
      document.getElementById('newTag').value = '';
      document.querySelector('.add-section .mood-row').querySelectorAll('.mood-btn').forEach(b => b.className = 'mood-btn');
      pendingMood = null;
      window.clearImage('new');
      setLoading(100);
      setStatus('已保存');
      render();
    } catch (e) {
      setStatus('保存失败');
      console.error(e);
    } finally {
      saveBtn.disabled = false;
    }
  };

  // ── Delete ──
  window.del = async function(firestoreId, imageUrl) {
    if (!confirm('确认删除这条记录？')) return;
    setStatus('删除中…', false);
    try {
      await deleteDoc(doc(db, 'entries', firestoreId));
      if (imageUrl) {
        try { await deleteObject(ref(storage, imageUrl)); } catch {}
      }
      entries = entries.filter(e => e.firestoreId !== firestoreId);
      setStatus('已删除');
      render();
    } catch (e) {
      setStatus('删除失败');
      console.error(e);
    }
  };

  // ── Edit ──
  window.openEdit = function(firestoreId) {
    const e = entries.find(x => x.firestoreId === firestoreId);
    if (!e) return;
    editingId = firestoreId;
    editImageUrl = e.image || null;
    editMood = e.mood || null;
    pendingImageFile = null;
    document.getElementById('editQuote').value = e.quote || '';
    document.getElementById('editTag').value = e.tag || '';
    const editMoodRow = document.querySelector('#editModal .mood-row');
    editMoodRow.querySelectorAll('.mood-btn').forEach(b => b.className = 'mood-btn');
    if (e.mood) editMoodRow.querySelector(`[data-mood="${e.mood}"]`)?.classList.add(`selected-${e.mood}`);
    if (e.image) {
      document.getElementById('editPreviewImg').src = e.image;
      document.getElementById('editPreviewWrap').style.display = 'block';
    } else {
      document.getElementById('editPreviewWrap').style.display = 'none';
    }
    document.getElementById('editModal').classList.add('active');
  };

  window.closeModal = function() {
    document.getElementById('editModal').classList.remove('active');
    editingId = null; editImageUrl = null; editMood = null; pendingImageFile = null;
  };

  window.saveEdit = async function() {
    if (!editingId) return;
    setStatus('保存中…', false);
    try {
      let finalImageUrl = editImageUrl;

      if (pendingImageFile && editImageUrl === '__pending__') {
        finalImageUrl = await uploadImage(pendingImageFile, editingId + '_' + Date.now());
      }

      const updates = {
        quote: document.getElementById('editQuote').value.trim(),
        tag:   document.getElementById('editTag').value.trim(),
        mood:  editMood,
        image: finalImageUrl === '__pending__' ? null : finalImageUrl,
      };

      await updateDoc(doc(db, 'entries', editingId), updates);
      const e = entries.find(x => x.firestoreId === editingId);
      if (e) Object.assign(e, updates);
      setStatus('已保存');
      window.closeModal();
      render();
    } catch (e) {
      setStatus('保存失败');
      console.error(e);
    }
  };

  // ── Export ──
  window.exportJSON = function() {
    const data = JSON.stringify(entries, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    a.href = url; a.download = `linnke-backup-${stamp}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  // ── Filter ──
  function getAllTags() {
    const tags = new Set();
    entries.forEach(e => { if (e.tag) tags.add(e.tag); });
    return [...tags];
  }

  function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    const tags = getAllTags();
    if (!tags.length) { bar.innerHTML = ''; return; }
    bar.innerHTML =
      `<span class="filter-label">筛选</span>` +
      `<button class="filter-tag${activeFilter === null ? ' active' : ''}" onclick="setFilter(null)">全部</button>` +
      tags.map(t => `<button class="filter-tag${activeFilter === t ? ' active' : ''}" onclick="setFilter('${esc(t)}')">${esc(t)}</button>`).join('');
  }

  window.setFilter = function(tag) {
    activeFilter = tag;
    renderFilterBar();
    renderEntries();
  };

  // ── Render ──
  function renderEntries() {
    const c = document.getElementById('entries');
    const countEl = document.getElementById('countDisplay');
    const filtered = activeFilter ? entries.filter(e => e.tag === activeFilter) : entries;

    if (!filtered.length) {
      countEl.textContent = entries.length ? '筛选结果为空' : '';
      c.innerHTML = `<div class="empty">${entries.length ? '这个标签下还没有记录。' : '还没有记录，把第一句触动你的话写下来吧。'}</div>`;
      return;
    }

    countEl.textContent = activeFilter ? `${filtered.length} / ${entries.length} 条` : `共 ${entries.length} 条`;

    c.innerHTML = filtered.map((e, i) => {
      const mood = e.mood && moodMap[e.mood];
      return `
        <div class="entry" style="animation-delay:${Math.min(i,8)*0.04}s">
          ${mood ? `<div class="entry-mood-bar mood-bar-${e.mood}"></div>` : ''}
          <div class="entry-actions">
            <button class="btn-icon" onclick="openEdit('${e.firestoreId}')">编辑</button>
            <button class="btn-icon btn-delete" onclick="del('${e.firestoreId}', '${e.image||''}')">删除</button>
          </div>
          ${e.image ? `<img class="entry-image" src="${e.image}" onclick="openLightbox(this.src)" loading="lazy">` : ''}
          ${e.quote ? `<div class="entry-quote">${esc(e.quote)}</div>` : ''}
          <div class="entry-meta">
            <div class="entry-meta-left">
              ${e.tag ? `<span class="entry-tag">${esc(e.tag)}</span>` : ''}
              ${mood ? `<span class="entry-mood-label" style="color:${mood.color};opacity:0.75">${mood.label}</span>` : ''}
            </div>
            <span class="entry-date">${formatDate(e.ts)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function render() {
    renderFilterBar();
    renderEntries();
  }

  // ── Lightbox ──
  window.openLightbox = function(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  };

  window.handleLightboxClick = function(e) {
    if (e.target === document.getElementById('lightbox')) window.closeLightbox();
  };

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { window.closeLightbox(); window.closeModal(); }
  });

  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) window.closeModal();
  });

  document.getElementById('newTag').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addEntry();
  });

  // ── Init ──
  loadEntries();
</script>
</body>
</html>
